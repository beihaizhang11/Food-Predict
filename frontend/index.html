<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基于点评文本的餐饮消费趋势预测系统</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="title-wrap">
      <h1>基于美团外卖点评文本的餐饮消费趋势预测系统</h1>
      <p>趋势预测 + 因子图谱 + 影响解释的闭环分析</p>
    </div>

    <div class="filters">
      <label>
        <span>开始日期</span>
        <input id="start" type="date" />
      </label>
      <label>
        <span>结束日期</span>
        <input id="end" type="date" />
      </label>
      <label>
        <span>商家</span>
        <select id="shopId">
          <option value="">全部商家</option>
        </select>
      </label>
      <button id="refreshBtn" type="button">刷新</button>
    </div>
    <div id="statusText" class="status-text"></div>
  </header>

  <main>
    <section class="panel">
      <h2>趋势预测</h2>
      <div id="trendChart" class="chart"></div>
      <div id="explainSummary" class="explain-summary"></div>
      <div id="driverCards" class="driver-cards"></div>
    </section>

    <section class="panel">
      <h2>因子知识图谱（聚合）</h2>
      <div id="graphChart" class="chart"></div>
    </section>

    <section class="panel">
      <h2>属性影响评价图</h2>
      <div id="attributeImpactChart" class="chart chart-short"></div>
    </section>

    <section class="panel panel-wide">
      <h2>工作流与内部数据快照</h2>
      <div id="workflowChart" class="chart chart-short"></div>
      <div id="workflowMetrics" class="metrics-grid"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
